(function(){
  var handled = false;
  function showError(extra){
    if(handled) return;
    handled = true;
    var root = document.getElementById('root');
    if(!root) return;
    var isFile = location.protocol === 'file:';
    root.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#FFFBF8;padding:24px;font-family:\'DM Sans\',sans-serif;box-sizing:border-box;">' +

          '<div style="font-size:28px;margin-bottom:10px;">⚠️</div>' +
          '<div style="font-family:\'Cormorant Garamond\',Georgia,serif;font-size:19px;color:#4A3540;margin-bottom:10px;">Le chargement a échoué</div>' +
          '<div style="font-size:13px;color:#8A6A72;line-height:1.7;margin-bottom:18px;text-align:left;">' +
            (isFile
              ? "Ce fichier est ouvert directement depuis ton ordinateur (l'adresse commence par <b>file://</b>). Firebase a besoin d'une vraie adresse web (<b>http://</b> ou <b>https://</b>) pour fonctionner — c'est presque sûrement la cause du problème. Héberge tes fichiers (Firebase Hosting, Netlify…) ou lance un serveur local, puis ouvre la page depuis cette adresse."
              : "Vérifie ta connexion internet et recharge la page. Si ça persiste, ouvre la console du navigateur (touche F12, onglet Console) et regarde le message d'erreur en rouge."
            ) +
            (extra ? ('<br><br><span style="color:#B8A0A8;font-size:11.5px;">Détail technique : ' + extra + '</span>') : '') +
          '</div>' +
          '<a href="connexion.html" style="display:inline-block;background:#D9829A;color:#fff;border-radius:100px;padding:10px 22px;text-decoration:none;font-size:13px;">Retour à la connexion</a>' +
        '</div>' +
      '</div>';
  }
  window.addEventListener('error', function(e){ showError(e.message); });
  window.setTimeout(function(){
    var root = document.getElementById('root');
    if(root && root.textContent.indexOf('Chargement de ton espace') !== -1) showError();
  }, 7000);
  window.__basShowError = showError;
})();
</script>

// Chaque utilisateur a sa propre collection de documents "bloom_pro_data",
// un document par clé (blm_dash, blm_m-sept, ...) → collection dédiée pour ne
// jamais entrer en collision avec un autre planner.
const storage = {
  get: async (k) => {
    if(!currentUser) return null;
    try{
      const snap = await db.collection("users").doc(currentUser.uid).collection("bloom_pro_data").doc(k).get();
      if(!snap.exists) return null;
      const data = snap.data();
      return data && data.value!==undefined ? {value:data.value} : null;
    }catch(e){ console.error("Erreur de lecture Firestore :", e); return null; }
  },
  set: async (k,v) => {
    if(!currentUser) return null;
    try{
      await db.collection("users").doc(currentUser.uid).collection("bloom_pro_data").doc(k).set({
        value:v,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      return {k,v};
    }catch(e){ console.error("Erreur d'écriture Firestore :", e); return null; }
  },
};

// Les jours (vue journalière) sont stockés à part, dans "bloom_pro_jours",
// pour bien séparer le contenu journalier du reste (thème, mois, échéances) —
// et ne jamais partager de collection avec un autre planner.
const storageJoursPro = {
  get: async (k) => {
    if (!currentUser) return null;
    try {
      const snap = await db.collection("users").doc(currentUser.uid).collection("bloom_pro_jours").doc(k).get();
      if (!snap.exists) return null;
      const data = snap.data();
      return data && data.value !== undefined ? { value: data.value } : null;
    } catch (e) {
      console.error("Erreur de lecture Firestore :", e);
      return null;
    }
  },
  set: async (k, v) => {
    if (!currentUser) return null;
    try {
      await db.collection("users").doc(currentUser.uid).collection("bloom_pro_jours").doc(k).set({
        value: v,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      return { k, v };
    } catch (e) {
      console.error("Erreur d'écriture Firestore :", e);
      return null;
    }
  },
};

const MONTHS=[

function jw(y,m,d){return(new Date(y,m-1,d).getDay()+6)%7;}
function di(y,m){return new Date(y,m,0).getDate();}
function dk(y,m,d){return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
function fd(y,m,d){const mn=MONTHS.find(x=>x.year===y&&x.month===m)?.name.toLowerCase()||"";return `${WD[jw(y,m,d)]} ${d} ${mn} ${y}`;}
function du(ds){const t=new Date(ds),n=new Date();n.setHours(0,0,0,0);return Math.ceil((t-n)/864e5);}
function buildCal(y,m){
  const mi=MONTHS.findIndex(x=>x.year===y&&x.month===m);
  const pv=mi>0?MONTHS[mi-1]:null,nx=mi<11?MONTHS[mi+1]:null;
  const pt=pv?di(pv.year,pv.month):30,fw=jw(y,m,1),tot=di(y,m);
  const cells=[];
  for(let i=0;i<fw;i++) cells.push({day:pt-fw+i+1,out:true,y:pv?.year,m:pv?.month});
  for(let d=1;d<=tot;d++) cells.push({day:d,out:false,y,m});
  let nc=1;while(cells.length%7!==0) cells.push({day:nc++,out:true,y:nx?.year,m:nx?.month});
  const wks=[];for(let i=0;i<cells.length;i+=7)wks.push(cells.slice(i,i+7));
  return wks;
}

function useStore(key,init,backend=storage){
  const [val,setVal]=useState(init);
  const [ready,setReady]=useState(false);
  const tmr=useRef(null);
  useEffect(()=>{
    let c=false;setReady(false);
    (async()=>{
      try{const r=await backend.get(key);if(!c)setVal(r?.value?JSON.parse(r.value):init);}
      catch(e){if(!c)setVal(init);}
      finally{if(!c)setReady(true);}
    })();
    return()=>{c=true;};
  },[key]);
  const up=useCallback((fn)=>{
    setVal(prev=>{
      const nx=typeof fn==="function"?fn(prev):fn;
      if(tmr.current)clearTimeout(tmr.current);
      tmr.current=setTimeout(async()=>{try{await backend.set(key,JSON.stringify(nx));}catch(e){}},400);
      return nx;
    });
  },[key]);
  return [val,up,ready];
}

// ── STATS MENSUELLES ──
// Parcourt tous les jours du mois (documents Firestore individuels) et agrège
// tâches, objectifs quotidiens et humeur.
function useMonthStats(y,m){
  const [stats,setStats]=useState(null);
  useEffect(()=>{
    let cancelled=false;
    setStats(null);
    (async()=>{
      const total=di(y,m);
      const keys=[];
      for(let day=1;day<=total;day++) keys.push(dk(y,m,day));
      const results=await Promise.all(keys.map(k=>storageJoursPro.get(`blm_d-${k}`)));
      if(cancelled) return;
      let todosDone=0,todosTotal=0;
      let objDone=0,objTotal=0;
      let moodCounts={};
      let daysWithData=0;
      results.forEach(r=>{
        if(!r||!r.value) return;
        let dd;try{dd=JSON.parse(r.value);}catch(e){return;}
        let hasSomething=false;
        if(Array.isArray(dd.todos)&&Array.isArray(dd.todosDone)){
          dd.todos.forEach((o,i)=>{if(o&&o.trim()!==""){todosTotal++;hasSomething=true;if(dd.todosDone[i])todosDone++;}});
        }
        if(Array.isArray(dd.obj)&&Array.isArray(dd.objDone)){
          dd.obj.forEach((o,i)=>{if(o&&o.trim()!==""){objTotal++;hasSomething=true;if(dd.objDone[i])objDone++;}});
        }
        if(dd.mood!==null&&dd.mood!==undefined){moodCounts[dd.mood]=(moodCounts[dd.mood]||0)+1;hasSomething=true;}
        if(hasSomething) daysWithData++;
      });
      let topMood=null;
      Object.entries(moodCounts).forEach(([k,v])=>{if(!topMood||v>topMood.count)topMood={idx:+k,count:v};});
      setStats({todosDone,todosTotal,objDone,objTotal,topMood,daysWithData,totalDays:total});
    })();
    return()=>{cancelled=true;};
  },[y,m]);
  return stats;
}

          </Card>
          <Card>
            <Lbl t="📁 Dossiers en cours" col={C.sage3}/>
            {dl(d.revisions,d.revisionsDone,"revisions","revisionsDone","Ex : Projet Y — phase 2")}
          </Card>
          <Card>
            <Lbl t="⏰ Deadlines & rappels"/>
            <TA value={d.deadlines||""} onChange={v=>set(x=>({...x,deadlines:v}))} rows={3} placeholder="Deadlines, rappels, points à ne pas oublier…"/>
          </Card>
        </div>
      </div>}

      {/* BIEN-ÊTRE */}
      {tab==="bienetre"&&<div className="bas-grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <Card>
          <Lbl t="🌸 Petits rituels du jour"/>
          <div style={{maxHeight:"44vh",overflowY:"auto",paddingRight:3}}>
            {["Corps","Esprit","Plaisir"].map(cat=>{
              const items=RITUALS.map((x,i)=>({...x,i})).filter(x=>x.c===cat);
              return <div key={cat} style={{marginBottom:9}}>
                <div style={{fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",color:C.rose3,fontWeight:600,fontFamily:GF,marginBottom:5}}>{cat}</div>
                {items.map(({l,i})=><div key={i} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                  <Chk on={d.rituals[i]} onChange={val=>set(x=>{const r=[...x.rituals];r[i]=val;return{...x,rituals:r};})}/>
                  <span style={{fontSize:11.5,color:C.text,fontFamily:GF,lineHeight:1.4}}>{l}</span>
                </div>)}
              </div>;
            })}
            {(d.ritualsCustom||[]).map((lbl,i)=><div key={`c${i}`} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
              <Chk on={d.rituals[RITUALS.length+i]} onChange={val=>set(x=>{const r=[...x.rituals];while(r.length<=RITUALS.length+i)r.push(false);r[RITUALS.length+i]=val;return{...x,rituals:r};})}/>
              <input value={lbl} onChange={e=>set(x=>{const rc=[...x.ritualsCustom];rc[i]=e.target.value;return{...x,ritualsCustom:rc};})} style={{flex:1,border:"none",borderBottom:`1px solid ${C.border}`,background:"transparent",fontSize:11.5,color:C.text,outline:"none",fontFamily:GF,padding:"2px 3px"}}/>
              <button onClick={()=>set(x=>{const rc=x.ritualsCustom.filter((_,j)=>j!==i);return{...x,ritualsCustom:rc};})} style={{fontSize:13,color:C.text3,background:"none",border:"none",cursor:"pointer"}}>×</button>
            </div>)}
            <AddBtn onClick={()=>set(x=>({...x,ritualsCustom:[...(x.ritualsCustom||[]),""]})) } label="Ajouter un rituel"/>
          </div>
        </Card>
        <Card>
          <Lbl t="💗 Mon état du jour" col={C.rose3}/>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {MOODS.map((md,i)=><button key={i} onClick={()=>set(x=>({...x,mood:i}))} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"7px 9px",borderRadius:10,cursor:"pointer",border:`1.5px solid ${d.mood===i?C.rose2:C.border}`,background:d.mood===i?C.rose1:C.cream,transition:"all .15s",minWidth:58}}>
              <span style={{fontSize:16}}>{md.e}</span>
              <span style={{fontSize:9.5,color:C.text3,fontFamily:GF}}>{md.fr}</span>
            </button>)}
          </div>
        </Card>
        <Card style={{gridColumn:"1/-1"}}>
          <Lbl t="📖 Lecture & inspiration du jour"/>
          <div className="bas-grid-4-stack" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}}>
            {[
              {k:"livreBienEtre",lb:"Livre en cours",ph:"Titre..."},
              {k:"pagesBienEtre",lb:"Pages lues aujourd'hui",ph:"3 pages..."},
              {k:"citation",lb:"Citation / pensée du jour",ph:"Note une citation..."},
              {k:"bienfait",lb:"Ce qui m'a fait du bien",ph:"Un moment agréable..."},
            ].map(({k,lb,ph})=>(
              <div key={k}>
                <div style={{fontSize:10.5,color:C.text2,fontFamily:GF,marginBottom:5}}>{lb}</div>
                <input value={d[k]||""} onChange={e=>set(x=>({...x,[k]:e.target.value}))} placeholder={ph} style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:9,padding:"7px 11px",fontSize:12.5,background:C.cream,outline:"none",fontFamily:GD,fontStyle:"italic",color:C.text}}/>
              </div>
            ))}
          </div>
        </Card>
      </div>}

      {/* JOURNAL */}
      {tab==="journal"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Card>
          <Lbl t="🌟 Mon intention du jour"/>
          <div style={{fontSize:11.5,color:C.rose3,background:C.rose1,borderRadius:9,padding:"6px 13px",marginBottom:9,display:"inline-block",fontFamily:GF}}>
            💭 Qu'est-ce que tu veux accomplir aujourd'hui ?
          </div>
          <TA value={d.intention} onChange={v=>set(x=>({...x,intention:v}))} rows={3} placeholder="Aujourd'hui, j'ai l'intention de…"/>
        </Card>
        <Card>
          <Lbl t="🌷 Gratitude du jour"/>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {d.gratitude.map((v,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:9}}>
              <div style={{width:22,height:22,borderRadius:"50%",background:C.rose1,color:C.rose3,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:GD,fontSize:11.5,flexShrink:0}}>{i+1}</div>
              <input value={v} onChange={e=>set(x=>{const g=[...x.gratitude];g[i]=e.target.value;return{...x,gratitude:g};})} placeholder="Je suis reconnaissante pour…" style={{flex:1,border:`1.5px solid ${C.border}`,borderRadius:9,padding:"7px 11px",fontSize:12.5,background:C.cream,outline:"none",fontFamily:GF,color:C.text}}/>
              {d.gratitude.length>1&&<button onClick={()=>set(x=>({...x,gratitude:x.gratitude.filter((_,j)=>j!==i)}))} style={{fontSize:13,color:C.text3,background:"none",border:"none",cursor:"pointer"}}>×</button>}
            </div>)}
          </div>
          <AddBtn onClick={()=>set(x=>({...x,gratitude:[...x.gratitude,""]}))} label="Ajouter une gratitude"/>
        </Card>
        <div className="bas-grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Card>
            <Lbl t="🌙 Comment s'est passée ta journée ?"/>
            <TA value={d.reflection} onChange={v=>set(x=>({...x,reflection:v}))} rows={4} placeholder="Aujourd'hui…"/>
          </Card>
          <Card>
            <Lbl t="💭 Qu'aurais-tu pu faire mieux ?"/>
            <TA value={d.amelioration} onChange={v=>set(x=>({...x,amelioration:v}))} rows={4} placeholder="J'aurais pu…"/>
          </Card>
        </div>
        <Card style={{background:C.cream,textAlign:"center"}}>
          <div style={{fontSize:26,margin:"4px 0 7px"}}>🌷</div>
          <div style={{fontFamily:GD,fontStyle:"italic",fontSize:13,color:C.text2,marginBottom:9}}>Le petit bonheur de ma journée…</div>
          <input value={d.notes||""} onChange={e=>set(x=>({...x,notes:e.target.value}))} placeholder="…" style={{width:"100%",border:"none",borderBottom:`1px solid ${C.border}`,background:"transparent",textAlign:"center",padding:5,fontSize:13,outline:"none",fontFamily:GF,color:C.text}}/>
        </Card>
      </div>}
    </div>
  </div>;
}

// ── APP ──
function App(){
  const [v,setV]=useState({type:"dashboard"});
  const [theme,setTheme]=useStore("blm_theme",{key:"rose",dark:false});
  applyTheme(theme.key,theme.dark);
  const goDash=()=>setV({type:"dashboard"});
  const goMonth=mi=>setV({type:"month",mi:Math.max(0,Math.min(11,mi))});
  const goDay=(y,m,day)=>setV({type:"day",y,m,day});
  const goSpec=()=>setV({type:"special"});
  return <div style={{width:"100%",minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column"}}>
    <TopBar onDash={goDash} onSpec={goSpec} theme={theme} setTheme={setTheme}/>
    <div style={{flex:1}}>
      {v.type==="dashboard"&&<Dashboard goMonth={goMonth}/>}
      {v.type==="month"&&<MonthView mi={v.mi} goDash={goDash} goMonth={goMonth} goDay={goDay}/>}
      {v.type==="day"&&<DayView y={v.y} m={v.m} day={v.day} goDash={goDash} goMonth={goMonth}/>}
      {v.type==="special"&&<SpecialDays goBack={goDash}/>}
    </div>
  </div>;
}

// ── Vérification de la connexion avant de monter l'app ──
if(auth){
  auth.onAuthStateChanged((user)=>{
    if(!user){
      window.location.href = "connexion.html";
      return;
    }
    currentUser = user;
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  }, (error)=>{
    console.error("Erreur onAuthStateChanged :", error);
    if(window.__basShowError) window.__basShowError(error.message);
  });
}
</script>
</body>
</html>
